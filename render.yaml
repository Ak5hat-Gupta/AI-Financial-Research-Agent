# Render blueprint for Atlas — backend API only.
# Frontend → deploy separately on Vercel.
# Postgres → Neon (https://neon.tech) — free, no expiry.
# Redis → Upstash (https://upstash.com) — free, no expiry.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: atlas-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # paste your Neon connection string
      - key: REDIS_URL
        sync: false   # paste your Upstash Redis URL
      - key: LLM_PROVIDER
        value: demo
      - key: CORS_ORIGINS
        sync: false   # paste your Vercel web URL after deploying frontend
