# Render blueprint for Atlas (backend API + web + Postgres + Redis).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: atlas-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: atlas-redis
          type: redis
          property: connectionString
      - key: LLM_PROVIDER
        value: demo
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: atlas-web
    runtime: docker
    dockerfilePath: ./web/Dockerfile
    dockerContext: ./web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: redis
    name: atlas-redis
    ipAllowList: []
    plan: free

databases:
  - name: atlas-db
    plan: free
    postgresMajorVersion: "16"
