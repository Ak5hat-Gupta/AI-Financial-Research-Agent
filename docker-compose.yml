services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fra_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financial_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: fra_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/financial_agent
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: http://localhost:5173,http://localhost:4173,http://localhost
      LLM_PROVIDER: ${LLM_PROVIDER:-demo}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: fra_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  uploads:
